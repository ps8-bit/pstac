# ============================================================
#  Netlify deploy config — คลังพร้อมส่ง (static site, ไม่มี build step)
# ============================================================

[build]
  publish = "."

# "/" → main HTML (rewrite, not redirect — URL stays as "/")
[[redirects]]
  from = "/"
  to   = "/Inventory Management System.html"
  status = 200

# ป้องกัน browser cache — ทุกไฟล์ต้อง revalidate ทุกครั้ง
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.jsx"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
